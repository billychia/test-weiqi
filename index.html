<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weiqi Tutorial - Learn Go</title>
    <style>
        /* ===== ALL STYLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f0e8;
            color: #2c2c2c;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fffcf7;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            padding: 30px 40px 50px;
        }

        h1 {
            font-size: 2.2em;
            color: #3d2b1f;
            border-bottom: 3px solid #d4a373;
            padding-bottom: 12px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h1 small {
            font-size: 0.5em;
            font-weight: 400;
            color: #7a5a44;
            margin-left: auto;
        }

        h2 {
            font-size: 1.5em;
            color: #5a3d2b;
            margin: 30px 0 15px 0;
            padding-left: 12px;
            border-left: 5px solid #d4a373;
        }

        h3 {
            font-size: 1.2em;
            color: #6b4c34;
            margin: 20px 0 10px 0;
        }

        p,
        li {
            line-height: 1.7;
            font-size: 1.05em;
            color: #3d3229;
        }

        ul,
        ol {
            padding-left: 25px;
            margin: 12px 0;
        }

        li {
            margin-bottom: 6px;
        }

        .section {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 35px;
            padding-top: 20px;
            border-top: 2px solid #e8ddd0;
        }

        .nav-buttons button {
            background: #8b6b4f;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-buttons button:hover {
            background: #6d4f37;
            transform: scale(1.02);
        }

        .nav-buttons button:disabled {
            background: #c4b5a8;
            cursor: not-allowed;
            transform: none;
        }

        .nav-buttons .btn-secondary {
            background: #b8a08e;
        }

        .nav-buttons .btn-secondary:hover {
            background: #9c8472;
        }

        .board-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
            background: #f0ebe3;
            padding: 20px;
            border-radius: 12px;
        }

        .board-wrapper canvas {
            background: #deb887;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            cursor: pointer;
            max-width: 100%;
            height: auto;
        }

        .board-controls {
            display: flex;
            gap: 12px;
            margin-top: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .board-controls button {
            background: #5a3d2b;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            cursor: pointer;
            transition: 0.15s;
        }

        .board-controls button:hover {
            background: #3d2b1f;
        }

        .board-controls button.active {
            background: #d4a373;
            box-shadow: 0 0 0 2px #5a3d2b;
        }

        .status-msg {
            margin-top: 12px;
            font-weight: 600;
            color: #5a3d2b;
            min-height: 28px;
            text-align: center;
        }

        .equipment-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin: 15px 0;
        }

        .equip-card {
            background: #f5efe8;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .equip-card img {
            width: 100%;
            max-width: 150px;
            border-radius: 8px;
            margin: 8px auto;
        }

        .equip-card .emoji-big {
            font-size: 4em;
            display: block;
            margin-bottom: 8px;
        }

        .equip-card h4 {
            color: #4d3222;
            margin-bottom: 4px;
        }

        .equip-card p {
            font-size: 0.9em;
            color: #6b5a4a;
        }

        .highlight-box {
            background: #faf3ea;
            border-left: 5px solid #d4a373;
            padding: 15px 20px;
            margin: 15px 0;
            border-radius: 0 8px 8px 0;
        }

        .territory-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            margin: 15px 0;
        }

        .territory-item {
            background: #f5efe8;
            padding: 15px 20px;
            border-radius: 12px;
            text-align: center;
            min-width: 140px;
        }

        .territory-item .count {
            font-size: 2.5em;
            font-weight: 700;
            color: #3d2b1f;
        }

        .grid-5x5 {
            display: grid;
            grid-template-columns: repeat(5, 40px);
            grid-template-rows: repeat(5, 40px);
            gap: 2px;
            background: #deb887;
            padding: 6px;
            border-radius: 6px;
            margin: 10px auto;
            width: fit-content;
        }

        .grid-5x5 .cell {
            background: #f5ede4;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4em;
            font-weight: 700;
        }

        .grid-5x5 .cell.black {
            background: #2c2c2c;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            margin: 4px;
        }

        .grid-5x5 .cell.white {
            background: #f0f0f0;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            margin: 4px;
            box-shadow: inset -2px -2px 6px rgba(0, 0, 0, 0.1);
        }

        .grid-5x5 .cell.empty {
            background: #f5ede4;
        }

        .etiquette-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px;
            margin: 12px 0;
        }

        .etiquette-card {
            background: #f5efe8;
            padding: 14px 18px;
            border-radius: 10px;
            border-bottom: 3px solid #d4a373;
        }

        .etiquette-card .emoji {
            font-size: 1.8em;
            margin-right: 8px;
        }

        .progress {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .progress .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ddd2c6;
            transition: 0.3s;
            cursor: pointer;
        }

        .progress .dot.done {
            background: #8b6b4f;
        }

        .progress .dot.active {
            background: #d4a373;
            box-shadow: 0 0 0 3px #f5ede4, 0 0 0 5px #d4a373;
        }

        .lesson-tag {
            display: inline-block;
            background: #d4a373;
            color: white;
            font-size: 0.7em;
            font-weight: 700;
            padding: 2px 14px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .image-container {
            margin: 15px 0;
            text-align: center;
        }

        .image-container img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .image-container .caption {
            font-size: 0.9em;
            color: #6b5a4a;
            margin-top: 6px;
            font-style: italic;
        }

        @media (max-width: 700px) {
            .container {
                padding: 16px;
            }
            h1 {
                font-size: 1.6em;
                flex-wrap: wrap;
            }
            .board-wrapper canvas {
                width: 100%;
                height: auto;
            }
            .nav-buttons {
                flex-wrap: wrap;
                gap: 10px;
            }
            .nav-buttons button {
                flex: 1;
                min-width: 100px;
                padding: 10px 16px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>
            ⚫ Weiqi Tutorial
            <small>Chapter 1: Introduction</small>
        </h1>

        <!-- Progress dots -->
        <div class="progress" id="progressDots"></div>

        <!-- Content will be rendered here -->
        <div id="contentContainer"></div>

        <!-- Navigation -->
        <div class="nav-buttons">
            <button id="prevBtn" class="btn-secondary" disabled>◀ Previous</button>
            <span style="font-size:0.95em;color:#7a6a5a;align-self:center;" id="sectionCounter">1 / 5</span>
            <button id="nextBtn">Next ▶</button>
        </div>
    </div>

    <script>
        // ============================================================
        //  LOAD LESSONS FROM JSON
        // ============================================================
        let lessonsData = null;
        let currentSection = 0;
        let totalSections = 0;

        fetch('data/lessons.json')
            .then(response => {
                if (!response.ok) throw new Error('Failed to load lessons.json');
                return response.json();
            })
            .then(data => {
                lessonsData = data.chapters;
                totalSections = lessonsData.length;
                renderAll();
            })
            .catch(error => {
                console.error('Error loading lessons:', error);
                document.getElementById('contentContainer').innerHTML = `
                    <div style="padding:40px;text-align:center;color:#b33;">
                        <h2>⚠️ Failed to load lessons</h2>
                        <p>Make sure <code>data/lessons.json</code> exists and is valid JSON.</p>
                        <p style="font-size:0.9em;color:#666;">Error: ${error.message}</p>
                    </div>
                `;
            });

        // ============================================================
        //  RENDER ENGINE
        // ============================================================
        function renderAll() {
            renderProgressDots();
            renderSection(currentSection);
            updateNavButtons();
        }

        function renderProgressDots() {
            const container = document.getElementById('progressDots');
            container.innerHTML = '';
            for (let i = 0; i < totalSections; i++) {
                const dot = document.createElement('span');
                dot.className = 'dot';
                if (i === currentSection) dot.classList.add('active');
                if (i < currentSection) dot.classList.add('done');
                dot.dataset.index = i;
                dot.addEventListener('click', () => goToSection(i));
                container.appendChild(dot);
            }
        }

        function renderSection(index) {
            const container = document.getElementById('contentContainer');
            const chapter = lessonsData[index];
            if (!chapter) return;

            let html = `
                <div class="section active">
                    <span class="lesson-tag">${chapter.id}</span>
                    <h2>${chapter.icon} ${chapter.title}</h2>
            `;

            chapter.content.forEach(block => {
                html += renderContentBlock(block);
            });

            html += `</div>`;
            container.innerHTML = html;

            // Re-initialize board if this section has one
            if (chapter.content.some(b => b.type === 'interactive-board')) {
                setTimeout(initBoard, 100);
            }
        }

        function renderContentBlock(block) {
            switch (block.type) {
                case 'paragraph':
                    return `<p>${block.text}</p>`;

                case 'subheading':
                    return `<h3>${block.text}</h3>`;

                case 'highlight':
                    let listHtml = '';
                    if (block.list) {
                        listHtml = `<ul>${block.list.map(item => `<li>${item}</li>`).join('')}</ul>`;
                    }
                    return `
                        <div class="highlight-box">
                            <strong>${block.title}</strong>
                            <p>${block.text}</p>
                            ${listHtml}
                            ${block.footer ? `<p style="margin-top:6px;font-style:italic;">${block.footer}</p>` : ''}
                        </div>
                    `;

                case 'image':
                    return `
                        <div class="image-container">
                            <img src="${block.src}" alt="${block.alt || ''}" loading="lazy">
                            ${block.caption ? `<div class="caption">${block.caption}</div>` : ''}
                        </div>
                    `;

                case 'grid':
                    return `
                        <div class="equipment-grid">
                            ${block.items.map(item => `
                                <div class="equip-card">
                                    ${item.image ? `<img src="${item.image}" alt="${item.title}">` : `<span class="emoji-big">${item.emoji}</span>`}
                                    <h4>${item.title}</h4>
                                    <p>${item.details}</p>
                                    <p style="font-size:0.85em;color:#7a6a5a;">${item.note}</p>
                                </div>
                            `).join('')}
                        </div>
                    `;

                case 'territory-example':
                    return `
                        <div style="display:flex;flex-wrap:wrap;gap:20px;justify-content:center;margin:15px 0;">
                            <div style="background:#f5efe8;padding:15px;border-radius:12px;text-align:center;">
                                <div class="grid-5x5">
                                    ${generateTerritoryGrid()}
                                </div>
                                <p style="margin-top:6px;font-weight:600;">5×5 Example Board</p>
                            </div>
                            <div style="background:#f5efe8;padding:15px 25px;border-radius:12px;display:flex;flex-direction:column;justify-content:center;">
                                <div class="territory-item">
                                    <span style="font-size:1.8em;">⚫</span> Black territory: <span class="count">${block.blackTerritory}</span>
                                </div>
                                <div class="territory-item" style="margin-top:6px;">
                                    <span style="font-size:1.8em;">⚪</span> White territory: <span class="count">${block.whiteTerritory}</span>
                                </div>
                                <div style="margin-top:10px;font-size:1.3em;font-weight:700;color:#3d2b1f;">
                                    🏆 ${block.winner} wins!
                                </div>
                            </div>
                        </div>
                    `;

                case 'interactive-board':
                    return `
                        <div class="board-wrapper">
                            <canvas id="goBoard" width="400" height="400"></canvas>
                            <div class="board-controls">
                                <button data-size="9" class="active">9×9</button>
                                <button data-size="13">13×13</button>
                                <button data-size="19">19×19</button>
                                <button id="resetBoardBtn">🔄 Reset</button>
                            </div>
                            <div class="status-msg" id="boardStatus">⚫ Black's turn — click to place a stone</div>
                        </div>
                        ${block.label ? `<p style="font-size:0.95em;color:#6b5a4a;">⬆️ ${block.label}</p>` : ''}
                    `;

                case 'liberty-example':
                    return `
                        <div style="display:flex;flex-wrap:wrap;gap:20px;justify-content:center;margin:12px 0;">
                            ${['Corner: 2 liberties', 'Side: 3 liberties', 'Middle: 4 liberties'].map(text => `
                                <div style="background:#f5efe8;padding:12px 18px;border-radius:10px;text-align:center;">
                                    <div style="font-size:2.2em;">📍 <span style="background:#2c2c2c;display:inline-block;width:28px;height:28px;border-radius:50%;"></span></div>
                                    <p><strong>${text}</strong></p>
                                </div>
                            `).join('')}
                        </div>
                    `;

                case 'connected-example':
                    return `
                        <div style="display:flex;flex-wrap:wrap;gap:20px;justify-content:center;margin:12px 0;">
                            ${[
                                { stones: 2, label: '2 stones', liberties: '6 liberties (shared)' },
                                { stones: 3, label: '3 stones (L-shape)', liberties: '7 liberties' },
                                { stones: 4, label: '4 stones (square)', liberties: '8 liberties' }
                            ].map(item => `
                                <div style="background:#f5efe8;padding:12px 18px;border-radius:10px;text-align:center;">
                                    <div style="font-size:2.2em;">
                                        ${Array(item.stones).fill('<span style="background:#2c2c2c;display:inline-block;width:24px;height:24px;border-radius:50%;"></span>').join('')}
                                    </div>
                                    <p><strong>${item.label}</strong><br><span style="font-size:0.9em;color:#6b5a4a;">${item.liberties}</span></p>
                                </div>
                            `).join('')}
                        </div>
                    `;

                case 'etiquette-grid':
                    return `
                        <div class="etiquette-grid">
                            ${block.items.map(item => `
                                <div class="etiquette-card">
                                    <span class="emoji">${item.emoji}</span>
                                    <strong>${item.title}</strong>
                                    <p style="font-size:0.9em;color:#5a4a3a;">${item.description}</p>
                                </div>
                            `).join('')}
                        </div>
                    `;

                default:
                    return `<p>Unknown content type: ${block.type}</p>`;
            }
        }

        // ============================================================
        //  HELPER: Territory Grid
        // ============================================================
        function generateTerritoryGrid() {
            const rows = [
                ['black', 'black', 'black', 'black', 'black'],
                ['black', 'empty', 'empty', 'empty', 'black'],
                ['black', 'empty', 'white', 'empty', 'white'],
                ['black', 'empty', 'empty', 'empty', 'white'],
                ['black', 'white', 'white', 'white', 'white']
            ];
            return rows.map(row =>
                row.map(cell => `<div class="cell ${cell}">${cell === 'empty' ? '·' : ''}</div>`).join('')
            ).join('');
        }

        // ============================================================
        //  NAVIGATION
        // ============================================================
        function goToSection(index) {
            if (index < 0 || index >= totalSections) return;
            currentSection = index;
            renderAll();
        }

        function updateNavButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const counter = document.getElementById('sectionCounter');

            prevBtn.disabled = currentSection === 0;
            nextBtn.textContent = currentSection === totalSections - 1 ? '✅ Finish' : 'Next ▶';
            counter.textContent = `${currentSection + 1} / ${totalSections}`;
        }

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentSection > 0) goToSection(currentSection - 1);
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            if (currentSection < totalSections - 1) {
                goToSection(currentSection + 1);
            } else {
                alert('🎉 You have completed Chapter 1! Well done!');
            }
        });

        // ============================================================
        //  GO BOARD - COMPLETE IMPLEMENTATION
        // ============================================================
        function initBoard() {
            const canvas = document.getElementById('goBoard');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const status = document.getElementById('boardStatus');
            if (!status) return;

            let gridSize = 9;
            const padding = 25;
            let board = [];
            let currentPlayer = 'black';
            let gameOver = false;

            function createBoard(size) {
                gridSize = size;
                board = Array(size).fill().map(() => Array(size).fill(null));
                currentPlayer = 'black';
                gameOver = false;
                status.textContent = '⚫ Black\'s turn — click to place a stone';
                drawBoard();
            }

            function getCanvasSize() {
                return gridSize * 38 + padding * 2;
            }

            function resizeCanvas() {
                const size = getCanvasSize();
                canvas.width = size;
                canvas.height = size;
                canvas.style.width = Math.min(size, 420) + 'px';
                canvas.style.height = Math.min(size, 420) + 'px';
            }

            function drawBoard() {
                resizeCanvas();
                const size = canvas.width;
                const pad = padding;
                const cSize = (size - pad * 2) / gridSize;

                // Wood background
                ctx.fillStyle = '#deb887';
                ctx.fillRect(0, 0, size, size);

                // Grid lines
                ctx.strokeStyle = '#3d2b1f';
                ctx.lineWidth = 1;
                for (let i = 0; i < gridSize; i++) {
                    ctx.beginPath();
                    ctx.moveTo(pad, pad + i * cSize);
                    ctx.lineTo(size - pad, pad + i * cSize);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(pad + i * cSize, pad);
                    ctx.lineTo(pad + i * cSize, size - pad);
                    ctx.stroke();
                }

                // Draw stones
                for (let row = 0; row < gridSize; row++) {
                    for (let col = 0; col < gridSize; col++) {
                        const stone = board[row][col];
                        if (!stone) continue;
                        const x = pad + col * cSize;
                        const y = pad + row * cSize;
                        const radius = cSize * 0.42;

                        const gradient = ctx.createRadialGradient(
                            x - radius * 0.3, y - radius * 0.3, radius * 0.1,
                            x, y, radius
                        );
                        if (stone === 'black') {
                            gradient.addColorStop(0, '#555');
                            gradient.addColorStop(1, '#111');
                        } else {
                            gradient.addColorStop(0, '#fff');
                            gradient.addColorStop(1, '#ccc');
                        }
                        ctx.beginPath();
                        ctx.arc(x, y, radius, 0, Math.PI * 2);
                        ctx.fillStyle = gradient;
                        ctx.shadowColor = 'rgba(0,0,0,0.3)';
                        ctx.shadowBlur = 6;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                }
            }

            // Handle clicks on the board
            canvas.addEventListener('click', (e) => {
                if (gameOver) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;

                const mouseX = (e.clientX - rect.left) * scaleX;
                const mouseY = (e.clientY - rect.top) * scaleY;
                const pad = padding;
                const cSize = (canvas.width - pad * 2) / gridSize;

                let col = Math.round((mouseX - pad) / cSize);
                let row = Math.round((mouseY - pad) / cSize);

                if (row < 0 || row >= gridSize || col < 0 || col >= gridSize) return;
                if (board[row][col] !== null) return;

                board[row][col] = currentPlayer;
                currentPlayer = currentPlayer === 'black' ? 'white' : 'black';
                status.textContent = currentPlayer === 'black' ? '⚫ Black\'s turn' : '⚪ White\'s turn';
                drawBoard();
            });

            // Board size buttons
            document.querySelectorAll('.board-controls button[data-size]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.board-controls button[data-size]').forEach(b => b.classList.remove(
                    'active'));
                    btn.classList.add('active');
                    const size = parseInt(btn.dataset.size);
                    createBoard(size);
                });
            });

            // Reset button
            const resetBtn = document.getElementById('resetBoardBtn');
            if (resetBtn) {
                resetBtn.addEventListener('click', () => {
                    const activeSizeBtn = document.querySelector('.board-controls button[data-size].active');
                    const size = activeSizeBtn ? parseInt(activeSizeBtn.dataset.size) : 9;
                    createBoard(size);
                });
            }

            // Initialize
            createBoard(9);
        }
    </script>

</body>
</html>
